name: MirrorKit
options:
  bundleIdPrefix: com.achraftrabelsi
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "8"
    DEVELOPMENT_TEAM: "QN66UQNDZR"
    CODE_SIGN_STYLE: Automatic

targets:
  MirrorKit:
    type: application
    platform: macOS
    sources:
      - path: MirrorKit
        excludes:
          - "*.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.achraftrabelsi.MirrorKit
        PRODUCT_NAME: MirrorKit
        INFOPLIST_FILE: MirrorKit/Info.plist
        CODE_SIGN_ENTITLEMENTS: MirrorKit/MirrorKit.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES

  MirrorKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MirrorKitTests
    dependencies:
      - target: MirrorKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.achraftrabelsi.MirrorKitTests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/MirrorKit.app/Contents/MacOS/MirrorKit
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  MirrorKit:
    build:
      targets:
        MirrorKit: all
        MirrorKitTests: [test]
    test:
      targets:
        - MirrorKitTests
    run:
      config: Debug
    archive:
      config: Release
